<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Acervo</title>
    <!-- Bibliotecas Externas -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ========================================== -->
    <!-- 1. CABEÇALHO (Logo, Buscas e Filtros)      -->
    <!-- ========================================== -->
    <header class="main-header">
        <div class="header-container">
            <h1 class="logo">Meu <span>Acervo</span></h1>
            
            <div class="toolbar">
                <div class="search-wrapper">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="barra-pesquisa" placeholder="Buscar no acervo...">
                </div>

                <div class="action-group">
                    <button id="btn-abrir-form" class="btn-primary" onclick="prepararAdicao()">
                        <i class="ph ph-plus-circle"></i> Adicionar
                    </button>
                    
                    <div class="util-buttons">
                        <button class="btn-icon" title="Exportar Backup JSON" onclick="exportarDados()">
                            <i class="ph ph-download-simple"></i>
                        </button>
                        <input type="file" id="input-importar" style="display: none;" onchange="importarDados(event)">
                        <button class="btn-icon" title="Importar Backup JSON" onclick="document.getElementById('input-importar').click()">
                            <i class="ph ph-upload-simple"></i>
                        </button>
                    </div>
                </div>
            </div>

            <nav class="filter-nav">
                <button class="btn-filter active" onclick="filtrarPorTipo('Todos')">Todos</button>
                <button class="btn-filter" onclick="filtrarPorTipo('Mangá')">Mangás</button>
                <button class="btn-filter" onclick="filtrarPorTipo('Manhwa')">Manhwas</button>
                <button class="btn-filter" onclick="filtrarPorTipo('Novel')">Novels</button>
            </nav>
        </div>
    </header>

    <!-- ========================================== -->
    <!-- 2. CONTEÚDO PRINCIPAL (Grid de Obras)      -->
    <!-- ========================================== -->
    <main>
        <div class="stats-bar">
            <span id="contador-total"><i class="ph ph-books"></i> 0 obras</span>
        </div>

        <!-- Os cartões são injetados aqui pelo JavaScript -->
        <div class="grid-mangas" id="lista-mangas"></div>
    </main>

    <!-- ========================================== -->
    <!-- 3. MODAIS (Janelas Sobrepostas)            -->
    <!-- ========================================== -->
    
    <!-- 3.1 Modal: Detalhes da Obra -->
    <div id="modal-fundo" class="modal-fundo" onclick="fecharModalPeloFundo(event)">
        <div class="modal-conteudo">
            <button class="botao-fechar" onclick="fecharModal()"><i class="ph ph-x"></i></button>
            <div class="modal-corpo">
                <img id="modal-capa" src="" alt="Capa da Obra">
                <div class="modal-info">
                    <h2 id="modal-titulo">Título</h2>
                    <span id="modal-tipo" class="tag-tipo">Tipo</span>
                    <p class="titulos-alt"><strong>Alts:</strong> <span id="modal-titulos-alt">...</span></p>
                    <div id="modal-generos" class="modal-generos"></div>
                    <p><strong>Status:</strong> <span id="modal-status">...</span></p>
                    
                    <div class="controle-leitura">
                        <strong>Capítulo:</strong>
                        <div class="contador">
                            <button class="btn-contador" onclick="alterarCapitulo(-1)">-</button>
                            <input type="number" id="modal-capitulo-editavel" onchange="atualizarCapituloDigitado()">
                            <button class="btn-contador" onclick="alterarCapitulo(1)">+</button>
                        </div>
                    </div>
                    
                    <div class="modal-sinopse">
                        <h3>Sinopse:</h3>
                        <p id="modal-texto-sinopse">...</p>
                    </div>
                    
                    <div class="acoes-modal">
                        <div id="container-links-leitura" class="container-links"></div>
                        <button id="btn-editar-obra" onclick="prepararEdicao()"><i class="ph ph-pencil-simple"></i> Editar</button>
                        <button id="btn-excluir-obra" onclick="excluirObra()"><i class="ph ph-trash"></i> Excluir</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3.2 Modal: Formulário de Cadastro/Edição -->
    <div id="modal-form-fundo" class="modal-fundo" onclick="fecharModalFormPeloFundo(event)">
        <div class="modal-conteudo modal-form-conteudo">
            <button class="botao-fechar" onclick="fecharModalForm()"><i class="ph ph-x"></i></button>
            <h2 id="titulo-form">Nova Obra</h2>
            
            <!-- Integração com API Externa -->
            <div class="busca-api-container">
                <div class="busca-api-header">
                    <i class="ph ph-magic-wand"></i>
                    <label>Busca Automática Inteligente</label>
                </div>
                <div class="busca-api-controles">
                    <input type="text" id="input-busca-api" placeholder="Digite o nome do mangá ou novel...">
                    <button type="button" id="btn-buscar-api" class="btn-buscar" onclick="buscarNaAPI()">
                        <i class="ph ph-magnifying-glass"></i> Buscar
                    </button>
                </div>
                <div id="resultado-busca-api" class="resultado-busca-api"></div>
            </div>

            <!-- Formulário Principal -->
            <form id="form-nova-obra">
                <input type="hidden" id="input-titulo-original" value="">
                <input type="hidden" id="input-id-firebase" value="">

                <div class="grupo-input">
                    <label>Título Principal</label>
                    <input type="text" id="input-titulo" required placeholder="Ex: Solo Leveling">
                </div>
                
                <div class="grupo-input">
                    <label>Gêneros (separados por vírgula)</label>
                    <input type="text" id="input-generos" required placeholder="Ex: Ação, Fantasia, Sistema">
                </div>
                
                <div class="linha-inputs-grid">
                    <div class="grupo-input">
                        <label>Tipo</label>
                        <div class="select-wrapper">
                            <select id="input-tipo">
                                <option value="Mangá">Mangá</option>
                                <option value="Manhwa">Manhwa</option>
                                <option value="Novel">Novel</option>
                            </select>
                            <i class="ph ph-caret-down select-icon"></i>
                        </div>
                    </div>
                    <div class="grupo-input">
                        <label>Capítulo Atual</label>
                        <input type="number" id="input-capitulo" required placeholder="0">
                    </div>
                </div>
                
                <div class="grupo-input">
                    <label>Link da Capa (URL)</label>
                    <input type="url" id="input-capa" required placeholder="https://...">
                </div>
                
                <div class="grupo-input">
                    <label>Links de Leitura (um por linha)</label>
                    <textarea id="input-link-leitura" rows="2" placeholder="Cole aqui os links para ler a obra..."></textarea>
                </div>
                
                <div class="grupo-input">
                    <label>Sinopse</label>
                    <textarea id="input-sinopse" rows="4" required placeholder="Um breve resumo sobre a história..."></textarea>
                </div>
                
                <!-- Campos ocultos para metadados padrões -->
                <input type="hidden" id="input-status" value="Em Andamento">
                <input type="hidden" id="input-nota" value="5">
                <input type="hidden" id="input-titulos-alt" value="">
                
                <button type="submit" class="btn-salvar">
                    <i class="ph ph-cloud-arrow-up"></i> Salvar na Nuvem
                </button>
            </form>
        </div>
    </div>

    <!-- Script Principal -->
    <script type="module" src="script.js"></script>
</body>
</html>
