<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Acervo</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <!-- ==========================================
         1. CABEÇALHO (Busca, Backup e Adicionar)
    =========================================== -->
    <header style="padding: 20px 0; border-bottom: 1px solid #222; margin-bottom: 30px;">
        <div style="max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; gap: 15px;">
            
            <!-- Barra de Pesquisa com Botão Limpar -->
            <div style="position: relative; width: 100%; max-width: 400px; display: flex; align-items: center;">
                <input type="text" id="barra-pesquisa" placeholder="Buscar título ou nome alternativo..." style="width: 100%; padding: 12px 40px 12px 15px; border-radius: 8px; background: #1a1a1a; border: 1px solid #333; color: #fff; font-family: inherit;">
                <button id="btn-limpar-busca" onclick="limparBusca()" style="position: absolute; right: 10px; background: transparent; border: none; color: #888; cursor: pointer; display: none; padding: 5px; align-items: center; justify-content: center;">
                    <i class="ph ph-x-circle" style="font-size: 1.2rem;"></i>
                </button>
            </div>
            
            <!-- Botões de Ação -->
            <div style="display: flex; gap: 10px;">
                <button onclick="fazerBackup()" style="background: #2a2a2a; color: #ddd; padding: 10px 15px; border-radius: 8px; border: 1px solid #444; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 6px; transition: 0.2s;">
                    <i class="ph ph-download-simple" style="font-size: 1.2rem;"></i> Backup
                </button>
                <button onclick="abrirModalForm()" style="background: #3b82f6; color: white; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px;">
                    <i class="ph ph-plus-circle" style="font-size: 1.2rem;"></i> Adicionar
                </button>
            </div>
            
        </div>
    </header>

    <!-- ==========================================
         2. LAYOUT PRINCIPAL (Lateral + Grade)
    =========================================== -->
    <div style="display: grid; grid-template-columns: 260px 1fr; gap: 30px; max-width: 1400px; margin: 0 auto; padding: 0 20px; align-items: start;">
        
        <!-- LATERAL ESQUERDA (Sidebar de Filtros) -->
        <aside style="background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; position: sticky; top: 20px;">
            
            <h3 style="color: #64748b; font-size: 0.8rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">Categorias</h3>
            <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 30px;" id="botoes-categoria">
                <button class="btn-filter sidebar-btn active" onclick="filtrarPorTipo('Todos', this)">Todos</button>
                <button class="btn-filter sidebar-btn" onclick="filtrarPorTipo('Mangá', this)">Mangás</button>
                <button class="btn-filter sidebar-btn" onclick="filtrarPorTipo('Manhwa', this)">Manhwas</button>
                <button class="btn-filter sidebar-btn" onclick="filtrarPorTipo('Novel', this)">Novels</button>
            </div>

            <h3 style="color: #64748b; font-size: 0.8rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">Filtros Avançados</h3>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="color: #94a3b8; font-size: 0.85rem;">Status da Obra</label>
                    <select id="select-status" onchange="aplicarFiltros()" style="background: #0f0f11; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-family: inherit;">
                        <option value="Todos">Todos</option>
                        <option value="Em Andamento">Em Andamento</option>
                        <option value="Finalizado">Finalizado</option>
                        <option value="Hiato">Hiato</option>
                    </select>
                </div>

                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="color: #94a3b8; font-size: 0.85rem;">Ordenar por</label>
                    <select id="select-ordem" onchange="aplicarFiltros()" style="background: #0f0f11; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-family: inherit;">
                        <option value="az">A - Z</option>
                        <option value="za">Z - A</option>
                        <option value="nota-alta">Maior Nota</option>
                        <option value="nota-baixa">Menor Nota</option>
                        <option value="cap-alto">Mais Capítulos</option>
                    </select>
                </div>

            </div>
        </aside>

        <!-- LADO DIREITO (Grade de Capas) -->
        <main style="min-width: 0;">
            <div id="contador-total" style="color: #888; margin-bottom: 20px; font-weight: 500;"></div>
            
            <div id="lista-mangas" class="grid-mangas">
                <!-- As capas serão desenhadas pelo JavaScript aqui -->
            </div>
        </main>

    </div>

    <!-- ==========================================
         3. MODAL DA OBRA (Mantido intacto)
    =========================================== -->
    <div id="modal-fundo" class="modal-fundo" onclick="fecharModalPeloFundo(event)">
        <div class="modal-conteudo">
            <button class="botao-fechar" onclick="fecharModal()"><i class="ph ph-x"></i></button>
            <div class="modal-corpo">
                <img id="modal-capa" src="" alt="Capa da Obra">
                
                <div class="modal-info">
                    <h2 id="modal-titulo">Título</h2>
                    
                    <div class="meta-badges">
                        <span id="modal-tipo" class="badge badge-tipo">Tipo</span>
                        <span id="modal-status" class="badge badge-status">Status</span>
                        <span class="badge badge-nota"><i class="ph-fill ph-star"></i> <span id="modal-nota-texto">5.0</span></span>
                    </div>
                    
                    <p class="titulos-alt"><strong>Alts:</strong> <span id="modal-titulos-alt">...</span></p>
                    <div id="modal-generos" class="modal-generos"></div>
                    
                    <div class="controle-leitura">
                        <div class="leitura-label">
                            <i class="ph ph-bookmark-simple"></i>
                            <strong>Progresso de Leitura</strong>
                        </div>
                        <div class="contador">
                            <button class="btn-contador" onclick="alterarCapitulo(-1)"><i class="ph ph-minus"></i></button>
                            <input type="number" id="modal-capitulo-editavel" onchange="atualizarCapituloDigitado()">
                            <button class="btn-contador" onclick="alterarCapitulo(1)"><i class="ph ph-plus"></i></button>
                        </div>
                    </div>
                    
                    <div class="modal-sinopse">
                        <h3>Sinopse</h3>
                        <p id="modal-texto-sinopse">...</p>
                    </div>
                    
                    <div class="acoes-modal">
                        <div id="container-links-leitura" class="container-links"></div>
                        <div class="acoes-secundarias">
                            <button id="btn-editar-obra" onclick="prepararEdicao()"><i class="ph ph-pencil-simple"></i> Editar</button>
                            <button id="btn-excluir-obra" onclick="excluirObra()"><i class="ph ph-trash"></i> Excluir</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         4. MODAL DE CADASTRO (Mantido intacto)
    =========================================== -->
    <div id="modal-form-fundo" class="modal-fundo" onclick="fecharModalFormPeloFundo(event)">
        <div class="modal-conteudo modal-form-conteudo">
            <button class="botao-fechar" onclick="fecharModalForm()"><i class="ph ph-x"></i></button>
            <h2 id="titulo-form">Nova Obra</h2>
            
            <div class="busca-api-container">
                <div class="busca-api-header">
                    <i class="ph ph-magic-wand"></i>
                    <label>Busca Automática (MyAnimeList)</label>
                </div>
                <div class="busca-api-controles">
                    <select id="select-fonte-api" class="select-api">
                        <option value="jikan">MyAnimeList</option>
                        <option value="mangadex">MangaDex</option>
                        <option value="kitsu">Kitsu</option>
                    </select>
                    <input type="text" id="input-busca-api" placeholder="Digite o título...">
                    <button type="button" id="btn-buscar-api" class="btn-buscar" onclick="buscarNaAPI()">
                        <i class="ph ph-magnifying-glass"></i> Buscar
                    </button>
                </div>
                <div id="resultado-busca-api" class="resultado-busca-api"></div>
            </div>

            <form id="form-nova-obra">
                <input type="hidden" id="input-id-firebase" value="">

                <div class="grupo-input">
                    <label>Título Principal</label>
                    <input type="text" id="input-titulo" required placeholder="Ex: Solo Leveling">
                </div>

                <div class="grupo-input">
                    <label>Títulos Alternativos (Opcional)</label>
                    <input type="text" id="input-titulos-alt" placeholder="Ex: Na Honjaman Rebeleop">
                </div>
                
                <div class="grupo-input">
                    <label>Gêneros (separados por vírgula)</label>
                    <input type="text" id="input-generos" required placeholder="Ex: Ação, Fantasia, Sistema">
                </div>
                
                <div class="linha-inputs-grid">
                    <div class="grupo-input">
                        <label>Tipo</label>
                        <div class="select-wrapper">
                            <select id="input-tipo">
                                <option value="Mangá">Mangá</option>
                                <option value="Manhwa">Manhwa</option>
                                <option value="Novel">Novel</option>
                            </select>
                            <i class="ph ph-caret-down select-icon"></i>
                        </div>
                    </div>
                    <div class="grupo-input">
                        <label>Capítulo Atual</label>
                        <input type="number" id="input-capitulo" required placeholder="0">
                    </div>
                </div>

                <div class="linha-inputs-grid">
                    <div class="grupo-input">
                        <label>Status</label>
                        <div class="select-wrapper">
                            <select id="input-status">
                                <option value="Em Andamento">Em Andamento</option>
                                <option value="Finalizado">Finalizado</option>
                                <option value="Hiato">Hiato</option>
                            </select>
                            <i class="ph ph-caret-down select-icon"></i>
                        </div>
                    </div>
                    <div class="grupo-input">
                        <label>Nota (1 a 5)</label>
                        <input type="number" id="input-nota" step="0.1" min="1" max="5" required placeholder="Ex: 5">
                    </div>
                </div>
                
                <div class="grupo-input">
                    <label>Link da Capa (URL)</label>
                    <input type="url" id="input-capa" required placeholder="https://...">
                </div>
                
                <div class="grupo-input">
                    <label>Links para Leitura</label>
                    <div id="container-links-inputs">
                        </div>
                    <button type="button" class="btn-add-link" onclick="adicionarCampoLink()">
                        <i class="ph ph-plus"></i> Adicionar Link
                    </button>
                </div>
                
                <div class="grupo-input">
                    <label>Sinopse</label>
                    <textarea id="input-sinopse" rows="4" required placeholder="Um breve resumo sobre a história..."></textarea>
                </div>
                
                <button type="submit" class="btn-salvar">
                    <i class="ph ph-cloud-arrow-up"></i> Salvar na Nuvem
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <!-- Botão Flutuante: Voltar ao Topo -->
    <button id="btn-topo" onclick="voltarAoTopo()" style="position: fixed; bottom: 30px; right: 30px; background: #3b82f6; color: white; width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; transition: 0.3s;">
        <i class="ph ph-caret-up"></i>
    </button>
</body>
</html>
