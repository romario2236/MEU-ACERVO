<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Acervo - Mangás & Comics</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Biblioteca para gerar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <!-- ==========================================
         1. CABEÇALHO (Busca e Ações)
    =========================================== -->
    <header style="padding: 20px 0; border-bottom: 1px solid #222; margin-bottom: 30px;">
        <div style="max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; gap: 15px;">
            
            <div style="position: relative; width: 100%; max-width: 400px; display: flex; align-items: center;">
                <input type="text" id="barra-pesquisa" placeholder="Buscar título ou nome alternativo..." style="width: 100%; padding: 12px 40px 12px 15px; border-radius: 8px; background: #1a1a1a; border: 1px solid #333; color: #fff;">
                <button id="btn-limpar-busca" onclick="limparBusca()" style="position: absolute; right: 10px; background: transparent; border: none; color: #888; cursor: pointer; display: none;">
                    <i class="ph ph-x-circle" style="font-size: 1.2rem;"></i>
                </button>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button onclick="gerarPDF()" style="background: #ef4444; color: white; padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 6px;">
                    <i class="ph ph-file-pdf"></i> PDF
                </button>
                <input type="file" id="input-importar" accept=".json" style="display: none;" onchange="importarDados(event)">
                <button onclick="document.getElementById('input-importar').click()" style="background: #2a2a2a; color: #ddd; padding: 10px 15px; border-radius: 8px; border: 1px solid #444; cursor: pointer;">
                    <i class="ph ph-upload-simple"></i>
                </button>
                <button onclick="exportarDados()" style="background: #2a2a2a; color: #ddd; padding: 10px 15px; border-radius: 8px; border: 1px solid #444; cursor: pointer;">
                    <i class="ph ph-download-simple"></i>
                </button>
                <button onclick="abrirModalForm()" style="background: #3b82f6; color: white; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px;">
                    <i class="ph ph-plus-circle"></i> Novo
                </button>
            </div>
        </div>
    </header>

    <!-- ==========================================
         2. LAYOUT PRINCIPAL (Sidebar + Grid)
    =========================================== -->
    <div style="display: grid; grid-template-columns: 260px 1fr; gap: 30px; max-width: 1400px; margin: 0 auto; padding: 0 20px; align-items: start;">
        
        <aside style="background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; position: sticky; top: 20px;">
            <h3 style="color: #64748b; font-size: 0.8rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">Categorias</h3>
            <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 30px;">
                <button class="btn-filter sidebar-btn active" onclick="filtrarPorTipo('Todos', this)">Todos</button>
                <button class="btn-filter sidebar-btn" onclick="filtrarPorTipo('Mangá', this)">Mangás</button>
                <button class="btn-filter sidebar-btn" onclick="filtrarPorTipo('Manhwa', this)">Manhwas</button>
                <button class="btn-filter sidebar-btn" onclick="filtrarPorTipo('Manhua', this)">Manhua</button>
                <button class="btn-filter sidebar-btn" onclick="filtrarPorTipo('Novel', this)">Novels</button>
            </div>

            <h3 style="color: #64748b; font-size: 0.8rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">Minhas Listas</h3>
            <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 30px;" id="container-listas-personalizadas">
                <!-- Preenchido pelo JS -->
            </div>

            <h3 style="color: #64748b; font-size: 0.8rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">Filtros</h3>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <select id="select-status" onchange="aplicarFiltros()" style="background: #0f0f11; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; width: 100%;">
                    <option value="Todos">Todos os Status</option>
                    <option value="Em Andamento">Em Andamento</option>
                    <option value="Finalizado">Finalizado</option>
                    <option value="Hiato">Hiato</option>
                </select>
                <select id="select-ordem" onchange="aplicarFiltros()" style="background: #0f0f11; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; width: 100%;">
                    <option value="az">Título (A-Z)</option>
                    <option value="za">Título (Z-A)</option>
                    <option value="nota-alta">Melhor Nota</option>
                    <option value="cap-alto">Mais Capítulos</option>
                </select>
            </div>
        </aside>

        <main style="min-width: 0;">
            <div id="contador-total" style="color: #888; margin-bottom: 20px; font-weight: 500;"></div>
            <div id="lista-mangas" class="grid-mangas"></div>
        </main>
    </div>

    <!-- ==========================================
         3. MODAL DE DETALHES
    =========================================== -->
    <div id="modal-fundo" class="modal-fundo" onclick="fecharModalPeloFundo(event)">
        <div class="modal-conteudo">
            <button class="botao-fechar" onclick="fecharModal()"><i class="ph ph-x"></i></button>
            <div class="modal-corpo">
                <div style="flex: 0 0 auto; width: 100%; max-width: 250px;">
                    <img id="modal-capa" src="" style="width: 100%; border-radius: 8px;">
                </div>
                <div class="modal-info">
                    <h2 id="modal-titulo" style="font-size: 2rem; color: #fff;">Título</h2>
                    <div class="meta-badges" style="display: flex; gap: 10px; margin: 15px 0;">
                        <span id="modal-tipo" class="badge-tipo">Tipo</span>
                        <span id="modal-status" class="badge-status">Status</span>
                        <span class="badge-nota"><i class="ph-fill ph-star"></i> <span id="modal-nota-texto">5.0</span></span>
                    </div>
                    <p style="font-size: 0.9rem; color: #aaa;">Alts: <span id="modal-titulos-alt"></span></p>
                    <div id="modal-generos" style="display: flex; gap: 8px; flex-wrap: wrap; margin: 15px 0;"></div>
                    <div class="controle-leitura">
                        <span>Progresso:</span>
                        <div class="contador">
                            <button onclick="alterarCapitulo(-1)"><i class="ph ph-minus"></i></button>
                            <input type="number" id="modal-capitulo-editavel" onchange="atualizarCapituloDigitado()">
                            <button onclick="alterarCapitulo(1)"><i class="ph ph-plus"></i></button>
                        </div>
                    </div>
                    <p id="modal-texto-sinopse" style="color: #ccc; line-height: 1.6; margin-bottom: 20px;"></p>
                    <div class="acoes-modal">
                        <div id="container-links-leitura"></div>
                        <div style="display: flex; gap: 10px;">
                            <button onclick="prepararEdicao()"><i class="ph ph-pencil"></i></button>
                            <button onclick="excluirObra()" style="color: #ef4444;"><i class="ph ph-trash"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<!-- ==========================================
     4. MODAL DE CADASTRO (VERSÃO AJUSTADA)
=========================================== -->
<div id="modal-form-fundo" class="modal-fundo" onclick="fecharModalFormPeloFundo(event)">
    <div class="modal-conteudo modal-form-conteudo" style="max-width: 600px;">
        <button class="botao-fechar" onclick="fecharModalForm()"><i class="ph ph-x"></i></button>
        <h2 id="titulo-form" style="margin-bottom: 20px;">Cadastrar Obra</h2>
        
        <!-- Bloco de Busca API -->
        <div class="busca-api-container" style="background: #1a2233; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <div class="busca-api-header" style="color: #60a5fa; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase;">
                <i class="ph ph-magic-wand"></i> Busca Automática
            </div>
            <div style="display: flex; gap: 10px;">
                <select id="select-fonte-api" style="flex: 1; padding: 10px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155;">
                    <option value="jikan">MyAnimeList</option>
                    <option value="mangadex">MangaDex</option>
                    <option value="kitsu">Kitsu</option>
                </select>
                <input type="text" id="input-busca-api" placeholder="Pesquisar..." style="flex: 2; padding: 10px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155;">
                <button type="button" onclick="buscarNaAPI()" style="background: #3b82f6; color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer;">
                    <i class="ph ph-magnifying-glass"></i>
                </button>
            </div>
            <div id="resultado-busca-api" class="resultado-busca-api"></div>
        </div>

        <form id="form-nova-obra">
            <input type="hidden" id="input-id-firebase">

            <div class="grupo-input">
                <label>Título Principal</label>
                <input type="text" id="input-titulo" required>
            </div>

            <div class="grupo-input">
                <label>Lista Personalizada</label>
                <input type="text" id="input-lista" list="sugestoes-listas" placeholder="Ex: Favoritos...">
                <datalist id="sugestoes-listas"></datalist>
            </div>

            <!-- Títulos Alternativos e Gêneros em uma linha -->
            <div class="linha-inputs-grid">
                <div class="grupo-input">
                    <label>Títulos Alternativos</label>
                    <input type="text" id="input-titulos-alt">
                </div>
                <div class="grupo-input">
                    <label>Gêneros</label>
                    <input type="text" id="input-generos" required>
                </div>
            </div>
            
            <div class="linha-inputs-grid">
                <div class="grupo-input">
                    <label>Tipo</label>
                    <select id="input-tipo">
                        <option value="Mangá">Mangá</option>
                        <option value="Manhwa">Manhwa</option>
                        <option value="Manhua">Manhua</option>
                        <option value="Novel">Novel</option>
                    </select>
                </div>
                <div class="grupo-input">
                    <label>Capítulo Atual</label>
                    <input type="number" id="input-capitulo" value="0">
                </div>
            </div>

            <div class="linha-inputs-grid">
                <div class="grupo-input">
                    <label>Status</label>
                    <select id="input-status">
                        <option value="Em Andamento">Em Andamento</option>
                        <option value="Finalizado">Finalizado</option>
                        <option value="Hiato">Hiato</option>
                    </select>
                </div>
                <div class="grupo-input">
                    <label>Nota (1 a 5)</label>
                    <input type="number" id="input-nota" step="0.1" min="0" max="5">
                </div>
            </div>
            
            <div class="grupo-input">
                <label>URL da Capa</label>
                <input type="url" id="input-capa">
            </div>
            
            <div class="grupo-input">
                <label>Links para Leitura</label>
                <div id="container-links-inputs" style="margin-bottom: 10px;"></div>
                <button type="button" class="btn-add-link" onclick="adicionarCampoLink()" style="width: 100%; border: 1px dashed #555; background: transparent; color: #888; padding: 10px; border-radius: 8px; cursor: pointer;">
                    <i class="ph ph-plus"></i> Adicionar Link
                </button>
            </div>
            
            <div class="grupo-input">
                <label>Sinopse</label>
                <textarea id="input-sinopse" rows="3"></textarea>
            </div>
            
            <button type="submit" class="btn-salvar">Salvar no Acervo</button>
        </form>
    </div>
</div>

    <script type="module" src="script.js"></script>
    <button id="btn-topo" onclick="voltarAoTopo()" style="position: fixed; bottom: 30px; right: 30px; display: none; background: #3b82f6; color: white; width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; z-index: 1000;"><i class="ph ph-caret-up"></i></button>
</body>
</html>
